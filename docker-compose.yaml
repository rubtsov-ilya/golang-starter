services:
  todoapp:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: ${PROJECT_ROOT}/cmd/todoapp/Dockerfile
    container_name: todoapp
    depends_on:
      todoapp-postgres:
        condition: service_healthy
    env_file:
      - ${PROJECT_ROOT}/.env
    environment:
      - HTTP_ADDR=:5050
      - POSTGRES_MASTER_HOST=todoapp-postgres
      - POSTGRES_REPLICA_HOST=todoapp-postgres
      - REDIS_HOST=todoapp-redis
      - LOGGER_FOLDER=/app/out/logs
    volumes:
      - ${PROJECT_ROOT}/out/logs:/app/out/logs
    ports:
      - "5050:5050"
    restart: always

  todoapp-postgres:
    image: postgres:18.1-bookworm
    container_name: todoapp-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_MASTER_USER}
      - POSTGRES_PASSWORD=${POSTGRES_MASTER_PASSWORD}
      - POSTGRES_DB=${POSTGRES_MASTER_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 2s

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: todoapp-env-keycloak
    command: start-dev
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_USER}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://todoapp-postgres:5432/${POSTGRES_MASTER_DB}
      - KC_DB_USERNAME=${POSTGRES_MASTER_USER}
      - KC_DB_PASSWORD=${POSTGRES_MASTER_PASSWORD}
      - KC_DB_SCHEMA=public
    ports:
      - "8081:8080"
    depends_on:
      todoapp-postgres:
        condition: service_healthy

  todoapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: todoapp-env-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:todoapp-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"

  swagger:
    build:
      context: ${PROJECT_ROOT}
      dockerfile_inline: |
        FROM golang:1.24.1-alpine
        RUN apk add --no-cache git
        RUN go install github.com/swaggo/swag/cmd/swag@v1.16.6
        WORKDIR /code
        ENTRYPOINT ["swag"]
    volumes:
      - ${PROJECT_ROOT}:/code
